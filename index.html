<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENVEE Real Estate</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to top,#0a0a0a,#1a1a1a);
    font-family:Arial;
    overflow:hidden;
}

/* skyline */
.city {
    position:absolute;
    bottom:0;
    width:100%;
    height:200px;
    background:repeating-linear-gradient(
        to right,
        #111 0px,
        #111 40px,
        #222 40px,
        #222 80px
    );
}

/* popup */
.popup {
    position:relative;
    background:white;
    padding:30px 40px;
    border-radius:15px;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    animation:pop 0.7s ease;
}

@keyframes pop{
    0%{transform:scale(0);}
    80%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* fireworks */
.firework {
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:gold;
    animation:explode 1.2s infinite;
}

@keyframes explode{
    0%{transform:scale(1);}
    50%{transform:scale(4);opacity:1;}
    100%{transform:scale(8);opacity:0;}
}

.f1{top:20%;left:30%;}
.f2{top:25%;left:60%;}
.f3{top:15%;left:80%;}
.f4{top:30%;left:10%;}
</style>
</head>

<body>

<div class="city"></div>

<div class="popup">
ENVEE REAL ESTATE
</div>

<div class="firework f1"></div>
<div class="firework f2"></div>
<div class="firework f3"></div>
<div class="firework f4"></div>

</body>
</html>
